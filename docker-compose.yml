services:
  db:
    image: postgres:15
    container_name: farm2fork_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farm2fork
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: api
    container_name: farm2fork_api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/farm2fork
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    container_name: farm2fork_driver_portal
    depends_on:
      - app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    restart: unless-stopped
