services:
  db:
    image: postgres:15
    container_name: farm2fork_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farm2fork
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: api
    container_name: farm2fork_api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/farm2fork
      VALHALLA_ENABLE_ROUTING: ${VALHALLA_ENABLE_ROUTING:-true}
      VALHALLA_BASE_URL: ${VALHALLA_BASE_URL:-http://host.docker.internal:8002}
      WAREHOUSE_NAME: ${WAREHOUSE_NAME:-Farm2Fork Warehouse}
      WAREHOUSE_STREET: ${WAREHOUSE_STREET:-100 Queen St W}
      WAREHOUSE_CITY: ${WAREHOUSE_CITY:-Toronto}
      WAREHOUSE_PROVINCE: ${WAREHOUSE_PROVINCE:-ON}
      WAREHOUSE_POSTAL_CODE: ${WAREHOUSE_POSTAL_CODE:-M5H 2N2}
      WAREHOUSE_COUNTRY: ${WAREHOUSE_COUNTRY:-Canada}
      WAREHOUSE_LATITUDE: ${WAREHOUSE_LATITUDE:-43.6534817}
      WAREHOUSE_LONGITUDE: ${WAREHOUSE_LONGITUDE:--79.3839347}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    container_name: farm2fork_driver_portal
    depends_on:
      - app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    restart: unless-stopped
