services:
  db:
    image: postgres:15
    container_name: farm2fork_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farm2fork
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: farm2fork_api
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/farm2fork
    ports:
      - "8000:8000"