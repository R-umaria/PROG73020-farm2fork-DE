version: "3.9"

services:
  app:
    build: .
    container_name: delivery_app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    command: python run.py

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: delivery_db
    ports:
      - "5432:5432"
