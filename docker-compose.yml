services:
  db:
    image: postgres:15
    container_name: farm2fork_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farm2fork
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: api
    container_name: farm2fork_api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/farm2fork}
      CUSTOMER_MODULE_BASE_URL: ${CUSTOMER_MODULE_BASE_URL:-http://159.203.16.186:3000}
      CUSTOMER_MODULE_CUSTOMER_LOOKUP_PATH: ${CUSTOMER_MODULE_CUSTOMER_LOOKUP_PATH:-/customers/{customer_id}}
      VALHALLA_ENABLE_ROUTING: ${VALHALLA_ENABLE_ROUTING:-false}
      VALHALLA_BASE_URL: ${VALHALLA_BASE_URL:-http://host.docker.internal:8002}
      OSRM_ENABLE_ROUTING: ${OSRM_ENABLE_ROUTING:-true}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.project-osrm.org}
      WAREHOUSE_NAME: ${WAREHOUSE_NAME:-Farm2Fork Warehouse}
      WAREHOUSE_STREET: ${WAREHOUSE_STREET:-108 University Ave E}
      WAREHOUSE_CITY: ${WAREHOUSE_CITY:-Waterloo}
      WAREHOUSE_PROVINCE: ${WAREHOUSE_PROVINCE:-ON}
      WAREHOUSE_POSTAL_CODE: ${WAREHOUSE_POSTAL_CODE:-N2J 2W2}
      WAREHOUSE_COUNTRY: ${WAREHOUSE_COUNTRY:-Canada}
      WAREHOUSE_LATITUDE: ${WAREHOUSE_LATITUDE:-43.4790290}
      WAREHOUSE_LONGITUDE: ${WAREHOUSE_LONGITUDE:--80.5179320}
      DRIVER_SERVICE_ENABLE_DEV_FALLBACK: ${DRIVER_SERVICE_ENABLE_DEV_FALLBACK:-false}
      DEMO_DATA_AUTO_SEED: ${DEMO_DATA_AUTO_SEED:-false}
      CUSTOMER_STATUS_CALLBACK_ENABLED: ${CUSTOMER_STATUS_CALLBACK_ENABLED:-false}
      CUSTOMER_STATUS_CALLBACK_BASE_URL: ${CUSTOMER_STATUS_CALLBACK_BASE_URL:-}
      CUSTOMER_STATUS_CALLBACK_PATH: ${CUSTOMER_STATUS_CALLBACK_PATH:-/api/orders/{order_id}/delivery-status}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-*}
      PLANNING_TIMEZONE: ${PLANNING_TIMEZONE:-America/Toronto}
      PLANNING_WORKDAY_START_HOUR: ${PLANNING_WORKDAY_START_HOUR:-9}
      PLANNING_WORKDAY_END_HOUR: ${PLANNING_WORKDAY_END_HOUR:-17}
      PLANNING_DRIVER_COUNT: ${PLANNING_DRIVER_COUNT:-100}
      PLANNING_TRUCK_COUNT: ${PLANNING_TRUCK_COUNT:-100}
      PLANNING_MAX_ORDERS_PER_ROUTE: ${PLANNING_MAX_ORDERS_PER_ROUTE:-50}
      PLANNING_AUTO_ASSIGN_DRIVERS: ${PLANNING_AUTO_ASSIGN_DRIVERS:-false}
      INTAKE_AUTO_SYNC_CUSTOMER: ${INTAKE_AUTO_SYNC_CUSTOMER:-true}
      INTAKE_AUTO_SCHEDULE: ${INTAKE_AUTO_SCHEDULE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    container_name: farm2fork_driver_portal
    depends_on:
      - app
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://app:8000}
    ports:
      - "3000:3000"
    restart: unless-stopped
