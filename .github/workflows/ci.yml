name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️ Checkout repo
      - uses: actions/checkout@v4

      # 2️ Set up Docker Buildx (for building images)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️ Build and start Docker containers
      - name: Build and start containers
        run: docker-compose up -d --build

      # 4️ Wait for DB to be ready
      - name: Wait for DB
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          until docker-compose exec -T db pg_isready -U postgres; do
            sleep 2
          done

      # 5 Run Alembic migrations
      - name: Run migrations
        run: docker-compose exec -T app alembic -c /app/alembic.ini upgrade head

      # 6 Run tests inside the app container
      - name: Run tests
        run: docker-compose exec -T app pytest -q --tb=short

      # 7️ Tear down
      - name: Stop containers
        if: always()
        run: docker-compose down