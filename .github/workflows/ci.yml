name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and start Docker containers
        run: docker compose up -d --build

      - name: Wait for DB to be ready
        run: |
          echo "Waiting for Postgres to be ready..."
          for i in {1..30}; do
            docker compose exec -T db pg_isready -U postgres && break
            sleep 2
          done

      - name: Run Alembic migrations
        run: docker compose exec -T app alembic -c /app/alembic.ini upgrade head

      - name: Run tests inside app container
        run: docker compose exec -T app pytest -q --tb=short

      - name: Tear down Docker containers
        run: docker compose down