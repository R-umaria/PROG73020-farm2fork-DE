name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - uses: actions/checkout@v4

      # 2. Install Docker Compose (needed on Ubuntu runners)
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      # 3. Build and start Docker Compose services in detached mode
      - name: Build and start containers
        run: docker-compose up -d --build

      # 4. Wait for Postgres to be ready
      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres..."
          until docker-compose exec -T db pg_isready -U postgres; do
            sleep 2
          done

      # 5. Run Alembic migrations inside the app container
      - name: Run Alembic migrations
        run: docker-compose exec -T app alembic -c /app/alembic.ini upgrade head

      # 6. Run tests inside the app container
      - name: Run tests
        run: docker-compose exec -T app pytest

      # 7. Tear down containers after the job
      - name: Stop and remove containers
        run: docker-compose down