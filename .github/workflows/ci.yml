name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Start containers
      run: docker-compose up -d --build

    - name: Wait for DB
      run: |
        echo "Waiting for DB..."
        for i in {1..20}; do
          docker exec farm2fork_db pg_isready -U postgres && break
          sleep 2
        done

    - name: Wait for app
      run: |
        echo "Waiting for app..."
        for i in {1..30}; do
          curl -f http://localhost:8000/health && break
          sleep 2
        done

    - name: Run migrations
      run: docker-compose exec -T app alembic upgrade head

    - name: Run unit tests
      run: docker-compose exec -T app pytest tests/unit

    - name: Run integration tests
      run: docker-compose exec -T app pytest tests/integration

    - name: Shutdown
      run: docker-compose down